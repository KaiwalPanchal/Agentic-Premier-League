version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    environment:
      - SQLITE_DB_PATH=/app/data/venue.db
    depends_on:
      - cv_gesture
      - cv_crowd

  cv_gesture:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.cv
    environment:
      - CAMERA_SOURCE=${CAMERA_SOURCE:-0}
      - CLASSIFIER_MODE=${CLASSIFIER_MODE:-geometric}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  cv_crowd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.cv
    environment:
      - CAMERA_SOURCE=${CAMERA_SOURCE:-0}
      - ZONE_DENSITY_LIMIT=${ZONE_DENSITY_LIMIT:-50}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  dashboard:
    build:
      context: ../dashboard
      dockerfile: ../deploy/Dockerfile.dashboard
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
