<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5"/>

  <!-- Stadium Outer Boundary -->
  <ellipse cx="400" cy="300" rx="350" ry="250" fill="#e0e0e0" stroke="#333" stroke-width="3"/>

  <!-- Seating Rings -->
  <ellipse cx="400" cy="300" rx="300" ry="200" fill="none" stroke="#888" stroke-width="2"/>
  <ellipse cx="400" cy="300" rx="250" ry="160" fill="none" stroke="#888" stroke-width="2"/>

  <!-- Field -->
  <rect x="250" y="180" width="300" height="240" fill="#4CAF50" stroke="#2e7d32" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" fill="white" font-size="18">FIELD</text>

  <!-- Gates -->
  <rect x="380" y="40" width="40" height="20" fill="#ff7043"/>
  <text x="400" y="35" text-anchor="middle" font-size="12">Gate A</text>

  <rect x="740" y="280" width="20" height="40" fill="#ff7043"/>
  <text x="770" y="305" font-size="12">Gate B</text>

  <rect x="380" y="540" width="40" height="20" fill="#ff7043"/>
  <text x="400" y="580" text-anchor="middle" font-size="12">Gate C</text>

  <rect x="40" y="280" width="20" height="40" fill="#ff7043"/>
  <text x="10" y="305" font-size="12">Gate D</text>

  <!-- Camera Nodes -->
  <circle cx="400" cy="80" r="8" fill="#d32f2f"/>
  <circle cx="720" cy="300" r="8" fill="#d32f2f"/>
  <circle cx="400" cy="520" r="8" fill="#d32f2f"/>
  <circle cx="80" cy="300" r="8" fill="#d32f2f"/>

  <!-- Camera Labels -->
  <text x="400" y="70" text-anchor="middle" font-size="10">Cam 1</text>
  <text x="720" y="290" text-anchor="middle" font-size="10">Cam 2</text>
  <text x="400" y="540" text-anchor="middle" font-size="10">Cam 3</text>
  <text x="80" y="290" text-anchor="middle" font-size="10">Cam 4</text>

  <!-- Control Room -->
  <rect x="650" y="50" width="100" height="50" fill="#90caf9" stroke="#1565c0"/>
  <text x="700" y="80" text-anchor="middle" font-size="12">Control Room</text>

  <!-- Legend -->
  <rect x="20" y="20" width="150" height="100" fill="white" stroke="#333"/>
  <text x="30" y="40" font-size="12">Legend:</text>
  <circle cx="40" cy="60" r="5" fill="#d32f2f"/>
  <text x="50" y="65" font-size="10">Camera</text>
  <rect x="35" y="75" width="10" height="10" fill="#ff7043"/>
  <text x="50" y="85" font-size="10">Gate</text>
  <rect x="35" y="90" width="10" height="10" fill="#4CAF50"/>
  <text x="50" y="100" font-size="10">Field</text>

</svg>